name: dotnet-inventory

services:
  db:
    image: postgres:18.4-alpine
    restart: unless-stopped

    environment:
      POSTGRES_DB: inventory_db
      POSTGRES_USER: inventory_app
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}

    ports:
      - "5433:5432"

    volumes:
      - postgres_data:/var/lib/postgresql

    healthcheck:
      test:
        [
          "CMD-SHELL",
          "pg_isready -U inventory_app -d inventory_db"
        ]
      interval: 5s
      timeout: 5s
      retries: 10
      start_period: 10s

  api:
    build:
      context: .
      dockerfile: Dockerfile

    restart: unless-stopped

    depends_on:
      db:
        condition: service_healthy

    environment:
      ASPNETCORE_ENVIRONMENT: Development
      ASPNETCORE_HTTP_PORTS: 8080

      Database__ApplyMigrations: "true"

      ConnectionStrings__InventoryDatabase: >-
        Host=db;
        Port=5432;
        Database=inventory_db;
        Username=inventory_app;
        Password=${POSTGRES_PASSWORD}

      Jwt__Issuer: DotnetInventoryApi
      Jwt__Audience: DotnetInventoryApi.Client
      Jwt__ExpirationMinutes: 60
      Jwt__Key: ${JWT_KEY}

    ports:
      - "8080:8080"

volumes:
  postgres_data: